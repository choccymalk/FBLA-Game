<!DOCTYPE html>
<html>

<head>
    <script src="js/AnimationStates.js"></script>
    <script src="js/Entity.js"></script>
    <script src="js/Door.js"></script>
    <script src="js/DialogueTree.js"></script>
    <script src="js/Response.js"></script>
    <script src="js/Level.js"></script>
</head>

<body>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <p>Entities</p>
    <ul id="entityList"></ul>
    <p>Add new entity</p>
    <textarea id="newEntityXTA" placeholder="x"></textarea>
    <textarea id="newEntityYTA" placeholder="y"></textarea>
    <textarea id="newEntityNameTA" placeholder="name"></textarea>
    <textarea id="newEntityTypeTA" placeholder="type"></textarea>
    <textarea id="newEntityImageTA" placeholder="image"></textarea>
    <button onclick="addNewEntity()">Add New Entity</button>
    <p>Doors</p>
    <ul id="doorList"></ul>
    <input type="file" id="fileInput">
    <button onclick="createAndSerializeObjects()">Create Test Level</button>
    <button onclick="populateEntityList()">Populate Entity List</button>
    <button onclick="populateDoorList()">Populate Door List</button>
    <button onclick="drawCurrentLevel()">Draw Current Level</button>
    <button onclick="drawGrid()">Draw Grid</button>
    <script>
        const gridSize = 24; // each grid cell is 24x24 px
        const entitySizeWidthCells = 3;
        const entitySizeHeightCells = 5;
        const doorSizeWidthCells = 2;
        const doorSizeHeightCells = 3;
        var entities;
        var currentLevel;
        var allLevels;
        var currentEntityResponses;
        var currentEntityResponseTree;
        var currentLevelDoors;
        var canvasContext = canvas.getContext('2d');
        var levelBackgroundImage = new Image();
        function createAndSerializeObjects() {
            var response0 = new Response("hi");
            var response1 = new Response("hello");
            var dialogueTree = new DialogueTree("hi", [response0, response1], "");
            var animStates = new AnimationStates(['idle1.png'], ['walkingup1.png'], ['walkingdown1.png'], ['walkingleft1.png'], ['walkingright1.png']);
            var entity0 = new Entity('player', 500, 500, 'https://media.officedepot.com/images/f_auto,q_auto,e_sharpen,h_120/products/6805895/6805895_o01_091020/6805895', 'name', 0, animStates, dialogueTree);
            var entity1 = new Entity('npc', 700, 300, 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcPDDQO_8SwiZkf8uPIUZ5YnilrOKpkJKZhg&s', 'name', 1, animStates, dialogueTree);
            var door0 = new Door(100, 100, 1, 0, 0, "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaQVaxjYQn8BT4DZQLNsPpZ9NTJw2qDVLilg&s");
            var level0 = new Level([[0], [0]], [entity0, entity1], "https://cdn.pixabay.com/photo/2018/01/14/23/12/nature-3082832_1280.jpg", [door0]);
            var levels = { "levels": [level0] };
            allLevels = levels;
            currentLevel = level0;
            console.log(JSON.stringify(levels));
        }
        function addNewEntity() {
            var newEntity = new Entity(newEntityTypeTA.value, newEntityXTA.value, newEntityYTA.value, newEntityImageTA.value, newEntityNameTA.value, currentLevel.getEntities.length, null, null);
            currentLevel.entities[currentLevel.entities.length] = newEntity;
            console.log(newEntity);
            populateEntityList();
            drawCurrentLevel();
            drawGrid();
        }
        function populateEntityList() {
            entityList.replaceChildren();
            currentLevel.getEntities.forEach(entity => {
                var newEntity = document.createElement('li');
                var newEntityName = document.createElement('p');
                var newEntityX = document.createElement('p');
                var newEntityY = document.createElement('p');
                var newEntityType = document.createElement('p');
                newEntityName.textContent = "Name: " + entity.name;
                newEntityX.textContent = "X: " + entity.x;
                newEntityY.textContent = "Y: " + entity.y;
                newEntityType.textContent = "Type: " + entity.type;
                newEntity.appendChild(newEntityName);
                newEntity.appendChild(newEntityX);
                newEntity.appendChild(newEntityY);
                newEntity.appendChild(newEntityType);
                entityList.appendChild(newEntity);
            });
        }
        function populateDoorList() {
            doorList.replaceChildren();
            currentLevel.getDoors.forEach(door => {
                var newDoor = document.createElement('li');
                var newDoorImage = document.createElement('p');
                var newDoorX = document.createElement('p');
                var newDoorY = document.createElement('p');
                var newDoorTargetLevel = document.createElement('p');
                var newDoorTargetX = document.createElement('p');
                var newDoorTargetY = document.createElement('p');
                newDoorImage.textContent = "Image: " + door.image;
                newDoorX.textContent = "X: " + door.x;
                newDoorY.textContent = "Y: " + door.y;
                newDoorTargetLevel.textContent = "Target Level: " + door.target_level;
                newDoorTargetX.textContent = "Target X: " + door.target_x;
                newDoorTargetY.textContent = "Target Y: " + door.target_y;
                newDoor.appendChild(newDoorImage);
                newDoor.appendChild(newDoorX);
                newDoor.appendChild(newDoorY);
                newDoor.appendChild(newDoorTargetLevel);
                newDoor.appendChild(newDoorTargetX);
                newDoor.appendChild(newDoorTargetY);
                doorList.appendChild(newDoor);
            });
        }
        function drawCurrentLevel() {
            levelBackgroundImage.src = currentLevel.background_image;
            canvasContext.drawImage(levelBackgroundImage, 0, 0);
            currentLevel.getEntities.forEach(entity => {
                entityImage = new Image();
                entityImage.src = entity.image;
                canvasContext.drawImage(entityImage, entity.x, entity.y);
            });
            currentLevel.getDoors.forEach(door => {
                doorImage = new Image();
                doorImage.src = door.image;
                canvasContext.drawImage(doorImage, door.x, door.y);
            });
        }
        function drawGrid(step = gridSize, color = '#000') {
            canvasContext.beginPath();
            canvasContext.strokeStyle = color;
            canvasContext.lineWidth = 1;

            // Vertical lines
            for (let x = 0; x <= canvas.width; x += step) {
                canvasContext.moveTo(x, 0);
                canvasContext.lineTo(x, canvas.height);
            }

            // Horizontal lines
            for (let y = 0; y <= canvas.height; y += step) {
                canvasContext.moveTo(0, y);
                canvasContext.lineTo(canvas.width, y);
            }

            canvasContext.stroke();
        }
        fileInput.addEventListener('change', function () {
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (event) {
                    console.log('File content:', event.target.result);
                };

                // Read the file as a Data URL or as text (readAsText)
                reader.readAsText(file);
            }
        });
    </script>
</body>

</html>
